<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  
  <!-- Brain shape outline -->
  <g id="brain">
    <!-- Left hemisphere -->
    <path d="M 80 70 Q 70 75 70 90 Q 70 110 80 115 Q 75 115 75 125 Q 75 140 85 145 Q 95 150 100 145" fill="#3b82f6" opacity="0.8"/>
    
    <!-- Right hemisphere -->
    <path d="M 120 70 Q 130 75 130 90 Q 130 110 120 115 Q 125 115 125 125 Q 125 140 115 145 Q 105 150 100 145" fill="#8b5cf6" opacity="0.8"/>
    
    <!-- Center connector -->
    <ellipse cx="100" cy="100" rx="15" ry="25" fill="#ec4899" opacity="0.7"/>
  </g>
  
  <!-- Neural network nodes -->
  <g id="nodes" stroke="#3b82f6" stroke-width="1.5">
    <!-- Top node -->
    <circle cx="100" cy="50" r="4" fill="#3b82f6"/>
    <line x1="100" y1="54" x2="100" y2="70" stroke="#3b82f6" stroke-width="1.5"/>
    
    <!-- Left nodes -->
    <circle cx="60" cy="80" r="3" fill="#8b5cf6"/>
    <line x1="65" y1="82" x2="80" y2="90" stroke="#8b5cf6" stroke-width="1"/>
    
    <!-- Right nodes -->
    <circle cx="140" cy="80" r="3" fill="#8b5cf6"/>
    <line x1="135" y1="82" x2="120" y2="90" stroke="#8b5cf6" stroke-width="1"/>
    
    <!-- Bottom nodes -->
    <circle cx="75" cy="135" r="3" fill="#ec4899"/>
    <circle cx="100" cy="150" r="4" fill="#ec4899"/>
    <circle cx="125" cy="135" r="3" fill="#ec4899"/>
  </g>
  
  <!-- Connecting lines between nodes -->
  <g stroke="#6366f1" stroke-width="1" opacity="0.6">
    <line x1="75" y1="135" x2="100" y2="150"/>
    <line x1="125" y1="135" x2="100" y2="150"/>
    <line x1="60" y1="80" x2="75" y2="135"/>
    <line x1="140" y1="80" x2="125" y2="135"/>
  </g>
  
  <!-- Accent glow -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#gradient)" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>